<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibS - Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-login-body {
            background: linear-gradient(160deg, #2E1A0E 0%, #6B3A2A 50%, #8B4513 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }
        .admin-login-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        .admin-login-logo img { width: 38px; height: 38px; object-fit: contain; }
        .admin-login-logo span {
            font-family: Georgia, serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #6B3A2A;
            letter-spacing: 2px;
        }
        .admin-badge {
            display: block;
            text-align: center;
            background: #6B3A2A;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto 1.8rem;
        }
        .admin-login-card h2 {
            font-size: 1.4rem;
            text-align: center;
            color: #2E1A0E;
            margin-bottom: 0.3rem;
        }
        .admin-login-card > p {
            text-align: center;
            font-size: 0.85rem;
            color: #8B6347;
            margin-bottom: 1.6rem;
        }
        .back-link {
            display: block;
            text-align: center;
            font-size: 0.85rem;
            color: #8B6347;
            margin-top: 1.2rem;
        }
        .back-link a { color: #7B3F2B; font-weight: 700; }
    </style>
</head>
<body class="admin-login-body">
    <div class="admin-login-card">
        <div class="admin-login-logo">
            <img src="images/Ellipse 3.png" alt="LibS Logo">
            <span>LibS</span>
        </div>
        <span class="admin-badge">Admin Portal</span>

        <h2>Admin Login</h2>
        <p>Sign in with your administrator credentials.</p>

        <form action="admin-dashboard.html">
            <div class="form-group">
                <label for="admin-email">Admin Email</label>
                <input type="email" id="admin-email" name="email" placeholder="Enter admin email" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="admin-password" name="password" placeholder="Enter password" required>
                    <button type="button" class="toggle-password">&#128065;</button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:0.5rem;">LOGIN AS ADMIN</button>
        </form>

        <p class="back-link">Not an admin? <a href="login.html">Back to User Login</a></p>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const inp = btn.previousElementSibling;
                inp.type = inp.type === 'password' ? 'text' : 'password';
            });
        });
    </script>
</body>
</html>
